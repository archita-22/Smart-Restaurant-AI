 <!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>REStro — Ask the Menu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --wine-950:#170307;
    --wine-900:#2b0710;
    --wine-800:#3d0a17;
    --wine-700:#5c1023;
    --wine-500:#8b1538;
    --wine-400:#a8264c;
    --gold:#c9a24a;
    --gold-soft:#e3c887;
    --cream:#f4e8da;
    --cream-dim:rgba(244,232,218,0.62);
    --glass-bg:rgba(255,255,255,0.055);
    --glass-bg-strong:rgba(255,255,255,0.09);
    --glass-border:rgba(233,201,140,0.22);
    --shadow-deep:0 30px 80px -20px rgba(0,0,0,0.65);
  }

  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    min-height:100vh;
    font-family:'Jost',sans-serif;
    color:var(--cream);
    background:
      radial-gradient(ellipse at 20% -10%, rgba(139,21,56,0.35), transparent 55%),
      radial-gradient(ellipse at 85% 15%, rgba(201,162,74,0.10), transparent 45%),
      radial-gradient(ellipse at 50% 120%, rgba(92,16,35,0.55), transparent 60%),
      linear-gradient(180deg, var(--wine-950) 0%, var(--wine-900) 45%, var(--wine-950) 100%);
    display:flex;
    flex-direction:column;
    align-items:center;
    overflow-x:hidden;
    position:relative;
  }

  /* ambient grain / vignette */
  body::after{
    content:"";
    position:fixed;
    inset:0;
    pointer-events:none;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.55) 100%);
    z-index:1;
  }

  .wrap{
    position:relative;
    z-index:2;
    width:100%;
    max-width:620px;
    padding:56px 22px 40px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---------- Hero / Welcome ---------- */
  .hero{
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    margin-bottom:34px;
  }

  .glass-emblem{
    width:64px;
    height:96px;
    margin-bottom:6px;
    overflow:visible;
  }
  .wine-fill{
    animation:fillPour 2.4s ease-out forwards;
  }
  @keyframes fillPour{
    0%{ transform:translateY(46px); }
    100%{ transform:translateY(6px); }
  }
  .glass-shimmer{
    animation:shimmer 3.2s ease-in-out 2.4s infinite;
  }
  @keyframes shimmer{
    0%,100%{ opacity:0.25; }
    50%{ opacity:0.6; }
  }

  .eyebrow{
    font-family:'Jost',sans-serif;
    font-size:11.5px;
    letter-spacing:0.42em;
    text-transform:uppercase;
    color:var(--gold-soft);
    opacity:0;
    animation:riseIn 0.9s ease-out 0.3s forwards;
    margin-bottom:14px;
  }

  h1.brand{
    font-family:'Cormorant Garamond',serif;
    font-weight:600;
    font-size:clamp(48px,10vw,72px);
    letter-spacing:0.02em;
    margin:0;
    line-height:1;
    background:linear-gradient(180deg, var(--gold-soft) 0%, var(--gold) 55%, #9c7a2e 100%);
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    opacity:0;
    animation:riseIn 0.9s ease-out 0.5s forwards;
  }

  .tagline{
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
    font-size:18px;
    color:var(--cream-dim);
    margin-top:12px;
    letter-spacing:0.02em;
    opacity:0;
    animation:riseIn 0.9s ease-out 0.75s forwards;
  }

  @keyframes riseIn{
    from{ opacity:0; transform:translateY(10px); }
    to{ opacity:1; transform:translateY(0); }
  }

  /* ---------- Glass Chat Card ---------- */
  .chat-card{
    width:100%;
    background:var(--glass-bg);
    border:1px solid var(--glass-border);
    border-radius:22px;
    backdrop-filter:blur(22px) saturate(140%);
    -webkit-backdrop-filter:blur(22px) saturate(140%);
    box-shadow:var(--shadow-deep), inset 0 1px 0 rgba(255,255,255,0.08);
    padding:22px 20px 18px;
    opacity:0;
    animation:riseIn 0.9s ease-out 1s forwards;
  }

  .quick-row{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin-bottom:14px;
  }
  .chip{
    font-family:'Jost',sans-serif;
    font-size:13px;
    color:var(--cream);
    background:rgba(255,255,255,0.05);
    border:1px solid rgba(233,201,140,0.25);
    padding:7px 14px;
    border-radius:999px;
    cursor:pointer;
    transition:all 0.2s ease;
  }
  .chip:hover{
    background:rgba(201,162,74,0.16);
    border-color:var(--gold);
    transform:translateY(-1px);
  }

  .messages{
    display:flex;
    flex-direction:column;
    gap:12px;
    max-height:340px;
    min-height:120px;
    overflow-y:auto;
    padding:6px 4px 10px;
    margin-bottom:14px;
  }
  .messages::-webkit-scrollbar{ width:5px; }
  .messages::-webkit-scrollbar-thumb{ background:rgba(201,162,74,0.35); border-radius:6px; }

  .empty-state{
    margin:auto;
    text-align:center;
    color:var(--cream-dim);
    font-size:14px;
    padding:24px 12px;
    line-height:1.6;
  }
  .empty-state span{
    display:block;
    font-family:'Cormorant Garamond',serif;
    font-style:italic;
    font-size:19px;
    color:var(--gold-soft);
    margin-bottom:6px;
  }

  .bubble{
    max-width:82%;
    padding:11px 15px;
    border-radius:14px;
    font-size:14.5px;
    line-height:1.55;
    animation:popIn 0.35s ease-out;
  }
  @keyframes popIn{
    from{ opacity:0; transform:translateY(6px) scale(0.98); }
    to{ opacity:1; transform:translateY(0) scale(1); }
  }
  .bubble.user{
    align-self:flex-end;
    background:linear-gradient(135deg, var(--wine-500), var(--wine-700));
    color:var(--cream);
    border-bottom-right-radius:4px;
  }
  .bubble.bot{
    align-self:flex-start;
    background:var(--glass-bg-strong);
    border:1px solid var(--glass-border);
    color:var(--cream);
    border-bottom-left-radius:4px;
    white-space:pre-line;
  }
  .bubble.bot div{
    line-height:1.9;
  }
  .bubble.bot .tag{
    display:block;
    font-size:10.5px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    color:var(--gold-soft);
    margin-bottom:5px;
  }
  .bubble.typing{
    display:flex;
    gap:4px;
    align-items:center;
    padding:13px 16px;
  }
  .bubble.typing i{
    width:6px;height:6px;border-radius:50%;
    background:var(--gold-soft);
    display:inline-block;
    animation:bounce 1.1s infinite ease-in-out;
  }
  .bubble.typing i:nth-child(2){ animation-delay:0.15s; }
  .bubble.typing i:nth-child(3){ animation-delay:0.3s; }
  @keyframes bounce{
    0%,80%,100%{ transform:translateY(0); opacity:0.5; }
    40%{ transform:translateY(-4px); opacity:1; }
  }

  .input-row{
    display:flex;
    gap:10px;
  }
  .input-row input{
    flex:1;
    background:rgba(0,0,0,0.22);
    border:1px solid rgba(233,201,140,0.22);
    border-radius:12px;
    padding:13px 15px;
    color:var(--cream);
    font-family:'Jost',sans-serif;
    font-size:14.5px;
    outline:none;
    transition:border-color 0.2s ease;
  }
  .input-row input::placeholder{ color:rgba(244,232,218,0.4); }
  .input-row input:focus{ border-color:var(--gold); }

  .emoji-btn{
    flex-shrink:0;
    width:52px;
    height:52px;
    border-radius:50%;
    display:flex;
    align-items:center;
    justify-content:center;
    background:linear-gradient(145deg, rgba(201,162,74,0.18), rgba(92,16,35,0.4));
    border:1px solid var(--glass-border);
    box-shadow:0 8px 22px -8px rgba(201,162,74,0.45), inset 0 1px 0 rgba(255,255,255,0.08);
    cursor:pointer;
    transition:transform 0.15s ease, box-shadow 0.15s ease, border-color 0.2s ease;
  }
  .emoji-btn:hover{
    transform:translateY(-1px) scale(1.04);
    border-color:var(--gold);
    box-shadow:0 10px 26px -8px rgba(201,162,74,0.6), inset 0 1px 0 rgba(255,255,255,0.1);
  }
  .emoji-btn:active{ transform:scale(0.96); }
  .emoji-btn:disabled{ opacity:0.6; cursor:not-allowed; transform:none; }
  #emojiDisplay{
    font-size:24px;
    display:inline-block;
    animation:emojiPop 0.4s ease;
  }
  @keyframes emojiPop{
    0%{ transform:scale(0.6) rotate(-8deg); opacity:0; }
    100%{ transform:scale(1) rotate(0deg); opacity:1; }
  }

  footer{
    position:relative;
    z-index:2;
    color:rgba(244,232,218,0.32);
    font-size:11.5px;
    letter-spacing:0.08em;
    text-transform:uppercase;
    margin:26px 0 12px;
    text-align:center;
  }

  @media (max-width:480px){
    .wrap{ padding:40px 14px 24px; }
    .messages{ max-height:280px; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration:0.01ms !important; animation-iteration-count:1 !important; }
  }
</style>
</head>
<body>

  <div class="wrap">
    <div class="hero">
      <svg class="glass-emblem" viewBox="0 0 64 96" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <clipPath id="glassClip">
            <path d="M14 6 H50 L44 52 C44 62 20 62 20 52 L14 6 Z" />
          </clipPath>
          <linearGradient id="wineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="#a8264c"/>
            <stop offset="100%" stop-color="#5c1023"/>
          </linearGradient>
        </defs>
        <path d="M14 6 H50 L44 52 C44 62 20 62 20 52 L14 6 Z" stroke="#c9a24a" stroke-width="1.6" opacity="0.75"/>
        <line x1="32" y1="62" x2="32" y2="86" stroke="#c9a24a" stroke-width="1.6" opacity="0.75"/>
        <line x1="20" y1="88" x2="44" y2="88" stroke="#c9a24a" stroke-width="1.6" opacity="0.75"/>
        <g clip-path="url(#glassClip)">
          <rect class="wine-fill" x="12" y="20" width="40" height="46" fill="url(#wineGrad)"/>
          <ellipse class="glass-shimmer" cx="24" cy="26" rx="6" ry="14" fill="#f4e8da" opacity="0.3"/>
        </g>
      </svg>
      <div class="eyebrow">Fine Dining · Bhubaneswar</div>
      <h1 class="brand">REStro</h1>
      <p class="tagline">Ask what's on tonight's table.</p>
    </div>

    <div class="chat-card">
      <div class="quick-row">
        <button class="chip" data-q="What's in breakfast?">🌅 Breakfast</button>
        <button class="chip" data-q="What's in lunch?">☀️ Lunch</button>
        <button class="chip" data-q="What's in dinner?">🌙 Dinner</button>
        <button class="chip" data-q="What mithai do you have?">🍮 Mithai</button>
      </div>

      <div class="messages" id="messages">
        <div class="empty-state" id="emptyState">
          <span>&ldquo;What's in dinner tonight?&rdquo;</span>
          Ask about a course, spice levels, or how many a plate serves — then tap the icon.
        </div>
      </div>

      <div class="input-row">
        <input type="text" id="userInput" placeholder="e.g. Is Chana Masala spicy? How many can Veg Biryani feed?" autocomplete="off" />
        <button class="emoji-btn" id="emojiBtn" aria-label="Ask">
          <span id="emojiDisplay">🍛</span>
        </button>
      </div>
    </div>

    <footer>REStro &middot; Answers curated fresh from the kitchen</footer>
  </div>

<script>
  const messagesEl = document.getElementById('messages');
  const emptyState = document.getElementById('emptyState');
  const input = document.getElementById('userInput');
  const emojiBtn = document.getElementById('emojiBtn');
  const emojiDisplay = document.getElementById('emojiDisplay');

  const foodEmojis = ['🍛','🍜','🥘','🍢','🍮','🍡','🍯','🍚'];
  let emojiIndex = 0;
  let emojiTimer = setInterval(() => {
    emojiIndex = (emojiIndex + 1) % foodEmojis.length;
    emojiDisplay.textContent = foodEmojis[emojiIndex];
    emojiDisplay.style.animation = 'none';
    void emojiDisplay.offsetWidth; // restart pop animation
    emojiDisplay.style.animation = '';
  }, 1100);

  function addBubble(text, who, tag){
    if(emptyState) emptyState.remove();
    const b = document.createElement('div');
    b.className = 'bubble ' + who;
    if(tag){
      const t = document.createElement('span');
      t.className = 'tag';
      t.textContent = tag;
      b.appendChild(t);
    }
    const body = document.createElement('div');
    body.textContent = text;
    b.appendChild(body);
    messagesEl.appendChild(b);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return b;
  }

  function addTyping(){
    const b = document.createElement('div');
    b.className = 'bubble bot typing';
    b.innerHTML = '<i></i><i></i><i></i>';
    messagesEl.appendChild(b);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return b;
  }

  async function askMenu(question){
    if(!question || !question.trim()) return;
    addBubble(question, 'user');
    input.value = '';
    emojiBtn.disabled = true;
    clearInterval(emojiTimer);
    emojiDisplay.textContent = '⏳';
    const typingBubble = addTyping();

    try{
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ input: question })
      });
      const data = await res.json();
      typingBubble.remove();
      addBubble(data.output || "Sorry, I couldn't find that.", 'bot', 'Tonight\u2019s Answer');
    }catch(err){
      typingBubble.remove();
      addBubble("Couldn't reach the kitchen right now. Please try again.", 'bot', 'Error');
      console.error(err);
    }finally{
      emojiBtn.disabled = false;
      emojiDisplay.textContent = foodEmojis[emojiIndex];
      emojiTimer = setInterval(() => {
        emojiIndex = (emojiIndex + 1) % foodEmojis.length;
        emojiDisplay.textContent = foodEmojis[emojiIndex];
        emojiDisplay.style.animation = 'none';
        void emojiDisplay.offsetWidth;
        emojiDisplay.style.animation = '';
      }, 1100);
      input.focus();
    }
  }

  emojiBtn.addEventListener('click', () => askMenu(input.value));
  input.addEventListener('keydown', (e) => { if(e.key === 'Enter') askMenu(input.value); });
  document.querySelectorAll('.chip').forEach(chip => {
    chip.addEventListener('click', () => askMenu(chip.dataset.q));
  });
</script>
</body>
</html>
